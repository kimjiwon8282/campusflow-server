spring:
  config:
    activate:
      on-profile: perf

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:1800000}
    refresh-token-validity-ms: ${JWT_REFRESH_TOKEN_VALIDITY_MS:1296000000}

  cookie:
    access-token-name: ${ACCESS_TOKEN_COOKIE_NAME:ACCESS_TOKEN}
    refresh-token-name: ${REFRESH_TOKEN_COOKIE_NAME:REFRESH_TOKEN}
    csrf-token-name: ${CSRF_TOKEN_COOKIE_NAME:XSRF-TOKEN}
    csrf-header-name: ${CSRF_HEADER_NAME:X-XSRF-TOKEN}
    secure: ${COOKIE_SECURE:false}
    http-only: true
    same-site: ${COOKIE_SAME_SITE:Lax}
    access-token-max-age-seconds: ${ACCESS_TOKEN_COOKIE_MAX_AGE_SECONDS:1800}
    refresh-token-max-age-seconds: ${REFRESH_TOKEN_COOKIE_MAX_AGE_SECONDS:1296000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

  refresh-token-cleanup:
    enabled: ${REFRESH_TOKEN_CLEANUP_ENABLED:false}
    cron: ${REFRESH_TOKEN_CLEANUP_CRON:0 0 * * * *}
    revoked-retention-days: ${REFRESH_TOKEN_REVOKED_RETENTION_DAYS:7}
